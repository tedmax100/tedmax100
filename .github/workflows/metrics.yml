name: Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]

# METRICS_TOKEN 需要 Classic PAT，勾選:
#   - repo (完整) 或至少 public_repo
#   - read:user
#   - read:org (若有組織)

jobs:
  metrics-overview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tedmax100
          template: classic
          base: header, activity, community, repositories, metadata
          filename: metrics/overview.svg
          config_timezone: Asia/Taipei
          config_display: large

  metrics-languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tedmax100
          template: classic
          base: ""
          filename: metrics/languages.svg
          config_timezone: Asia/Taipei
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

  metrics-topics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tedmax100
          template: classic
          base: ""
          filename: metrics/topics.svg
          config_timezone: Asia/Taipei
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 0
          plugin_topics_sort: stars

  metrics-habits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tedmax100
          template: classic
          base: ""
          filename: metrics/habits.svg
          config_timezone: Asia/Taipei
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_from: 100
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

  metrics-isocalendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tedmax100
          template: classic
          base: ""
          filename: metrics/isocalendar.svg
          config_timezone: Asia/Taipei
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
